<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Karte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.81.1/dist/L.Control.Locate.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { height: 100vh; width: 100%; }

    #info {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 14px;
      color: #333;
      transition: right 0.25s ease;
    }
    #info.shifted { right: 290px; }

    #list-toggle {
      position: absolute;
      top: 46px;
      right: 10px;
      z-index: 1002;
      background: white;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      color: #333;
      transition: right 0.25s ease;
    }
    #list-toggle:hover { background: #f5f5f5; }

    #sidebar {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 1001;
      width: 280px;
      background: white;
      box-shadow: -2px 0 8px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    #sidebar.open { transform: translateX(0); }

    #sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #sidebar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #sidebar-title { font-size: 14px; font-weight: bold; color: #333; }
    #sidebar-close {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #888;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #sidebar-close:hover { background: #f0f0f0; }

    #sidebar-sort { display: flex; gap: 6px; }
    .sort-btn {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #555;
    }
    .sort-btn.active {
      background: #4a90d9;
      color: white;
      border-color: #4a90d9;
    }

    #user-list { flex: 1; overflow-y: auto; }
    .user-item {
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .user-item:hover { background: #f5f9ff; }
    .user-name { font-size: 13px; font-weight: 500; color: #333; }
    .user-plz { font-size: 12px; color: #888; }
    .group-header {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      background: #f7f7f7;
      border-bottom: 1px solid #eee;
      border-top: 1px solid #eee;
    }
    .group-header:first-child { border-top: none; }

    /* Custom Search Control */
    .leaflet-control-namesearch {
      position: relative;
    }
    .leaflet-control-namesearch input {
      display: block;
      padding: 5px 8px;
      font-size: 13px;
      border: none;
      outline: none;
      border-radius: 4px;
      width: 200px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .leaflet-control-namesearch .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      width: 200px;
      background: white;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 4px 4px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      z-index: 9999;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .search-dropdown-item {
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }
    .search-dropdown-item:last-child { border-bottom: none; }
    .search-dropdown-item:hover { background: #f0f5ff; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">Lade Einträge...</div>
  <button id="list-toggle">☰ Liste</button>

  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-top">
        <div id="sidebar-title">Mitglieder</div>
        <button id="sidebar-close">✕</button>
      </div>
      <div id="sidebar-sort">
        <button class="sort-btn active" id="sort-name">A–Z Name</button>
        <button class="sort-btn" id="sort-plz">PLZ ↑</button>
      </div>
    </div>
    <div id="user-list"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.locatecontrol@0.81.1/dist/L.Control.Locate.min.js"></script>
  <script>
    const map = L.map('map').setView([51.1657, 10.4515], 6);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 18,
    }).addTo(map);

    L.control.locate({
      position: 'topleft',
      flyTo: true,
      strings: { title: 'Meinen Standort anzeigen' },
      locateOptions: { maxZoom: 12 },
    }).addTo(map);

    const NameSearchControl = L.Control.extend({
      onAdd: function() {
        const container = L.DomUtil.create('div', 'leaflet-control-namesearch');
        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);

        const input = L.DomUtil.create('input', '', container);
        input.type = 'text';
        input.placeholder = 'Name suchen…';

        const dropdown = L.DomUtil.create('div', 'search-dropdown', container);

        input.addEventListener('input', () => {
          const q = input.value.toLowerCase().trim();
          dropdown.innerHTML = '';
          if (!q) { dropdown.style.display = 'none'; return; }

          const matches = allUsers.filter(u => u.name.toLowerCase().includes(q)).slice(0, 8);
          if (matches.length === 0) { dropdown.style.display = 'none'; return; }

          matches.forEach(user => {
            const item = document.createElement('div');
            item.className = 'search-dropdown-item';
            item.textContent = user.name;
            item.addEventListener('click', () => {
              input.value = user.name;
              dropdown.style.display = 'none';
              const marker = markerMap[user.discord_id];
              if (marker) cluster.zoomToShowLayer(marker, () => marker.openPopup());
            });
            dropdown.appendChild(item);
          });
          dropdown.style.display = 'block';
        });

        document.addEventListener('click', e => {
          if (!container.contains(e.target)) dropdown.style.display = 'none';
        });

        return container;
      },
    });

    const DATA_URL = 'https://raw.githubusercontent.com/TomBuZi/discord_community_map_data/main/data/users.json';

    const infoBox      = document.getElementById('info');
    const sidebar      = document.getElementById('sidebar');
    const listToggle   = document.getElementById('list-toggle');
    const sidebarClose = document.getElementById('sidebar-close');
    const userListEl   = document.getElementById('user-list');
    const sortNameBtn  = document.getElementById('sort-name');
    const sortPlzBtn   = document.getElementById('sort-plz');

    let allUsers    = [];
    let markerMap   = {};
    let currentSort = 'name';

    const cluster = L.markerClusterGroup({ maxClusterRadius: 40 });

    function openSidebar() {
      sidebar.classList.add('open');
      listToggle.style.right = '290px';
      infoBox.classList.add('shifted');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      listToggle.style.right = '10px';
      infoBox.classList.remove('shifted');
    }

    listToggle.addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    sidebarClose.addEventListener('click', closeSidebar);

    sortNameBtn.addEventListener('click', () => {
      currentSort = 'name';
      sortNameBtn.classList.add('active');
      sortPlzBtn.classList.remove('active');
      renderList();
    });
    sortPlzBtn.addEventListener('click', () => {
      currentSort = 'plz';
      sortPlzBtn.classList.add('active');
      sortNameBtn.classList.remove('active');
      renderList();
    });

    function renderList() {
      const sorted = [...allUsers].sort((a, b) =>
        currentSort === 'name'
          ? a.name.localeCompare(b.name, 'de')
          : a.plz.localeCompare(b.plz)
      );

      // Group by land; missing land defaults to Deutschland
      const groups = new Map();
      sorted.forEach(user => {
        const land = user.land || 'Deutschland';
        if (!groups.has(land)) groups.set(land, []);
        groups.get(land).push(user);
      });

      // Deutschland first, rest alphabetical
      const order = [...groups.keys()].sort((a, b) => {
        if (a === 'Deutschland') return -1;
        if (b === 'Deutschland') return 1;
        return a.localeCompare(b, 'de');
      });

      userListEl.innerHTML = '';
      order.forEach(land => {
        const header = document.createElement('div');
        header.className = 'group-header';
        header.textContent = `${land} (${groups.get(land).length})`;
        userListEl.appendChild(header);

        groups.get(land).forEach(user => {
          const item = document.createElement('div');
          item.className = 'user-item';
          item.innerHTML =
            `<span class="user-name">${escapeHtml(user.name)}</span>` +
            `<span class="user-plz">${escapeHtml(user.plz)}</span>`;
          item.addEventListener('click', () => {
            const marker = markerMap[user.discord_id];
            if (marker) cluster.zoomToShowLayer(marker, () => marker.openPopup());
          });
          userListEl.appendChild(item);
        });
      });
    }

    fetch(DATA_URL)
      .then(r => { if (!r.ok) throw new Error('Netzwerkfehler'); return r.json(); })
      .then(users => {
        allUsers = users;

        if (users.length === 0) {
          infoBox.textContent = 'Noch keine Einträge vorhanden.';
          return;
        }

        users.forEach(user => {
          const popup =
            `<b>${escapeHtml(user.name)}</b><br>` +
            `PLZ: ${escapeHtml(user.plz)}<br>` +
            `<a href="https://discord.com/users/${escapeHtml(user.discord_id)}" target="_blank" rel="noopener">Discord Profil öffnen</a>`;

          const marker = L.marker([user.lat, user.lng], { title: user.name })
            .bindPopup(popup);
          cluster.addLayer(marker);
          markerMap[user.discord_id] = marker;
        });

        map.addLayer(cluster);
        renderList();
        infoBox.textContent = `${users.length} Mitglied${users.length === 1 ? '' : 'er'} auf der Karte`;

        new NameSearchControl({ position: 'topleft' }).addTo(map);
      })
      .catch(err => {
        console.error('Fehler beim Laden der Daten:', err);
        infoBox.textContent = 'Fehler beim Laden der Einträge.';
      });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
