<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Karte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { height: 100vh; width: 100%; }
    #info {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">Lade Einträge...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Karte initialisieren, zentriert auf Deutschland
    const map = L.map('map').setView([51.1657, 10.4515], 6);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 18,
    }).addTo(map);

    const DATA_URL = 'https://raw.githubusercontent.com/TomBuZi/discord_community_map_bot/main/data/users.json';

    const infoBox = document.getElementById('info');

    fetch(DATA_URL)
      .then(response => {
        if (!response.ok) throw new Error('Netzwerkfehler');
        return response.json();
      })
      .then(users => {
        if (users.length === 0) {
          infoBox.textContent = 'Noch keine Einträge vorhanden.';
          return;
        }

        users.forEach(user => {
          const popup = `
            <b>${escapeHtml(user.name)}</b><br>
            PLZ: ${escapeHtml(user.plz)}<br>
            <a href="https://discord.com/users/${escapeHtml(user.discord_id)}" target="_blank" rel="noopener">
              Discord Profil öffnen
            </a>
          `;
          L.marker([user.lat, user.lng])
            .addTo(map)
            .bindPopup(popup);
        });

        infoBox.textContent = `${users.length} Mitglied${users.length === 1 ? '' : 'er'} auf der Karte`;
      })
      .catch(err => {
        console.error('Fehler beim Laden der Daten:', err);
        infoBox.textContent = 'Fehler beim Laden der Einträge.';
      });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
